<!DOCTYPE html>
<html>
<body>
    <h1>Contact Me</h1>
    <!-- Simple Registration Form -->
    <form method="post">

        <fieldset>
            <legend>Contact Me Form</legend>

            <label for="name">First Name:</label>
            <input type="text" id="name" placeholder="Enter your first name" name="name" required><br><br>

            <label for="name">Last Name:</label>
            <input type="text" id="name" placeholder="Enter your last name" name="name" required><br><br>

            <label>Gender:</label><br><br>
            <input type="radio" name="gender" value="male"> Male<br><br>
            <input type="radio" name="gender" value="female"> Female<br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" name="email" required><br><br>

            <label for="name">Company:</label>
            <input type="text" id="name" placeholder="Enter company name" name="name" ><br><br>

            <label>Reason of Contact:</label> <br><br>
            <input type="radio" name="ROC" value="projects"> Projects <br><br>
            <input type="radio" name="ROC" value="thesis"> Thesis <br><br>
            <input type="radio" name="ROC" value="job"> Job<br><br>
            
            <label>Topics:</label><br><br>
            <input type="checkbox" name="Topics" value="male"> Web Development<br><br>
            <input type="checkbox" name="Topics" value="female"> Mobile Development<br><br>
            <input type="checkbox" name="Topics" value="female"> AI/ML Development<br><br>

            <label for="consultationDate">Consultation Date:</label>
            <input type="date" id="consultationDate" placeholder="Enter consultation date" name="consultationDate" required><br><br>

            <input type="submit" value="Submit">
            <input type="reset">

            <br>
            <a href="../index.html">Back to Home</a>

        </fieldset>

    </form><br>  
</body>
</html>
