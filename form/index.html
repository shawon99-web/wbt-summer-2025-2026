<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method = "post">
        <fieldset>
            <legend>Donor Information</legend>
               <table>

                 <tr>
                    <td><label for="fname">First name :</label></td>
                    <td><input type="text" id="fname" name="fname" required></td>
                 </tr>

                 <tr>
                    <td><label for="lname">Last name :</label></td>
                    <td><input type="text" id="lname" name="lname" required></td>
                 </tr>

                <tr>
                    <td><label for="company">Company :</label></td>
                    <td><input type="text" id="company" name="company"></td>
                 </tr>

                <tr>
                    <td><label for="address1">Address 1 :</label></td>
                    <td><input type="text" id="address1" name="address1" required></td>
                 </tr>

                 <tr>
                    <td><label for="address2">Address 2 :</label></td>
                    <td><input type="text" id="address2" name="address2"></td>
                 </tr>
                 
                 <tr>
                    <td><label for="city">City :</label></td>
                    <td><input type="text" id="city" name="city"></td>
                 </tr>
                 
                  <tr>
                    <td><label for="state">State :</label></td>
                    <td>
                        <select id="state" required>
                         <option value="">Select a state </option>
                         <option>Dhaka</option>
                         <option>Khulna</option>
                         <option>Rajsahi</option>
                        <option>Chottogram</option>
                    </select>
                   </td>
                  </tr>
                   <tr>
                    <td><label for="zip">Zip Code :</label></td>
                    <td><input type="text" id="zip" name="zip" required></td>
                 </tr>

                  <tr>
                    <td><label for="country">Country:</label></td>
                    <td>
                        <select id="state" required>
                         <option value="">Select a Country </option>
                         <option>Bangladesh</option>
                         <option>Pakistan</option>
                         <option>Uzbekistan</option>
                        <option>Afganistan</option>
                    </select>
                   </td>
                  </tr>

                   <tr>
                    <td><label for="phone"> Phone :</label></td>
                    <td><input type="number" id="" name="phone"></td>
                 </tr>





                 </table>




                 
                 

                 
                 

               </table>




        </fieldset>
</body>
</html>
